name: Deploy Nexo Hub

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  deploy:
    name: Deploy Panel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/nexo-hub
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh ~/nexo-hub
